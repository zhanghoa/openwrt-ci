name: Prepare Config Only (No Build)

on:
  workflow_dispatch:
    inputs:
      config_preset:
        description: '选择预设配置（仓库 configs/ 目录下的文件）'
        required: true
        default: 'ipq60xx-6.12-nowifi-nss.config'
        type: choice
        options:
          - ipq60xx-6.12-nowifi-nss.config
          - ipq60xx-6.12-nowifi-nss-full.config
          - ipq60xx-6.12-nowifi-nss-mini.config
          - custom (手动输入文件名)
      custom_config_name:
        description: '当选择 "custom" 时，请输入配置文件路径（如 configs/my.config）'
        required: false
        type: string
      ssh:
        description: '启用 SSH 调试（在 feeds 安装后、生成配置前进入）'
        required: false
        default: 'false'
        type: boolean
      upload_config:
        description: '上传生成的 .config 文件到 Artifact'
        required: false
        default: 'true'
        type: boolean

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  DIY_SCRIPT: libwrt.sh          # 可选，如果仓库有 DIY 脚本会执行
  TZ: Asia/Shanghai

jobs:
  Prepare-Config:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # 配置准备很快，30分钟足够

    steps:
    - name: 快速清理磁盘空间
      run: |
        echo "清理大型工具以腾出空间..."
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: 安装编译依赖（仅用于 make defconfig / download）
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev \
          libssl-dev python3-dev python3-pip rsync subversion sudo unzip wget \
          xz-utils zlib1g-dev dos2unix libfuse-dev
        sudo timedatectl set-timezone "$TZ"

    - name: 检出仓库（用于获取配置文件、DIY脚本等）
      uses: actions/checkout@v4

    - name: 克隆 OpenWrt 源码
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

    - name: 缓存 dl 目录（加速下载）
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-prepare-dl-${{ hashFiles('configs/*.config') }}
        restore-keys: |
          ${{ runner.os }}-prepare-dl-

    - name: 确定配置文件路径
      id: config
      run: |
        if [ "${{ github.event.inputs.config_preset }}" == "custom" ]; then
          CONFIG_FILE="${{ github.event.inputs.custom_config_name }}"
        else
          CONFIG_FILE="configs/${{ github.event.inputs.config_preset }}"
        fi
        echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        echo "使用配置文件: $CONFIG_FILE"

    - name: 更新并安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ---- SSH 调试（可选） ----
    - name: 设置 SSH 调试
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3

    # ---- 应用配置并生成 .config ----
    - name: 生成最终配置
      run: |
        cd openwrt
        
        # 复制预设配置文件
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "::error::找不到配置文件: $CONFIG_FILE"
          exit 1
        fi
        cp $CONFIG_FILE .config
        
        # 如果有 DIY 脚本，执行它（可能修改 .config）
        if [ -f "$GITHUB_WORKSPACE/$DIY_SCRIPT" ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
          $GITHUB_WORKSPACE/$DIY_SCRIPT
        fi
        
        # 运行 defconfig 整理依赖关系
        yes "" | make defconfig
        
        # 下载软件包源码（确保后续编译时不需要网络，但这里仅下载）
        make download -j8
        find dl -name "*.badcheck" -delete

    - name: 验证 .config 是否存在
      run: |
        if [ ! -f openwrt/.config ]; then
          echo "::error::.config 文件未生成！"
          exit 1
        fi
        echo "✅ .config 文件已生成，大小：$(du -h openwrt/.config | cut -f1)"

    # ---- 上传 .config（始终执行） ----
    - name: 上传 .config 到 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: config-${{ github.run_id }}-${{ github.run_attempt }}
        path: openwrt/.config
        if-no-files-found: error   # 如果没找到文件则报错
