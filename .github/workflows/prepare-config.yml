name: Prepare Config via SSH (Manual)

on:
  workflow_dispatch:
    inputs:
      repo_preset:
        description: '选择源码仓库预设'
        required: true
        default: 'immortalwrt-24.10'
        type: choice
        options:
          - openwrt-23.05
          - openwrt-24.10
          - immortalwrt-23.05
          - immortalwrt-24.10
          - custom
      custom_repo_url:
        description: '当选择 "custom" 时，请输入 Git 仓库 URL'
        required: false
        type: string
      custom_repo_branch:
        description: '当选择 "custom" 时，请输入分支名'
        required: false
        type: string
      diy_script:
        description: '可选：在工作流中额外执行的脚本（如预置配置），留空则跳过'
        required: false
        default: ''
        type: string
      ssh_enabled:
        description: '启用 SSH 手动配置（进入后请执行 make menuconfig 生成 .config）'
        required: false
        default: true
        type: boolean

env:
  TZ: Asia/Shanghai

jobs:
  Prepare-Config:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 给手动操作留足时间

    steps:
    - name: 清理磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: 安装编译依赖
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev \
          libssl-dev python3-dev python3-pip rsync subversion sudo unzip wget \
          xz-utils zlib1g-dev dos2unix libfuse-dev
        sudo timedatectl set-timezone "$TZ"

    - name: 检出工作流仓库（用于获取 DIY 脚本）
      uses: actions/checkout@v4

    - name: 确定源码仓库和分支
      id: repo
      run: |
        PRESET="${{ github.event.inputs.repo_preset }}"
        if [ "$PRESET" == "custom" ]; then
          REPO_URL="${{ github.event.inputs.custom_repo_url }}"
          REPO_BRANCH="${{ github.event.inputs.custom_repo_branch }}"
          if [ -z "$REPO_URL" ] || [ -z "$REPO_BRANCH" ]; then
            echo "::error::自定义仓库时，必须同时提供 URL 和分支"
            exit 1
          fi
        else
          case "$PRESET" in
            openwrt-23.05)   REPO_URL="https://github.com/openwrt/openwrt.git"; REPO_BRANCH="openwrt-23.05" ;;
            openwrt-24.10)   REPO_URL="https://github.com/openwrt/openwrt.git"; REPO_BRANCH="openwrt-24.10" ;;
            immortalwrt-23.05) REPO_URL="https://github.com/immortalwrt/immortalwrt.git"; REPO_BRANCH="openwrt-23.05" ;;
            immortalwrt-24.10) REPO_URL="https://github.com/immortalwrt/immortalwrt.git"; REPO_BRANCH="openwrt-24.10" ;;
            *) echo "::error::未知预设"; exit 1 ;;
          esac
        fi
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "使用源码: $REPO_URL (分支: $REPO_BRANCH)"

    - name: 克隆源码
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

    - name: 更新并安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 执行 DIY 脚本（如果有）
      if: github.event.inputs.diy_script != ''
      run: |
        DIY_SCRIPT="${{ github.event.inputs.diy_script }}"
        if [ -f "$GITHUB_WORKSPACE/$DIY_SCRIPT" ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_SCRIPT
        else
          echo "::warning::DIY 脚本 $DIY_SCRIPT 不存在，跳过"
        fi

    # ---- SSH 手动配置 ----
    - name: 启动 SSH 调试（手动运行 make menuconfig）
      if: github.event.inputs.ssh_enabled == true
      uses: mxschmitt/action-tmate@v3
      continue-on-error: true
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        limit-access-to-actor: true

    # ---- SSH 结束后，检查 .config 并整理 ----
    - name: 检查 .config 是否存在
      run: |
        if [ ! -f openwrt/.config ]; then
          echo "::error::未找到 .config 文件，请确保在 SSH 中执行了 make menuconfig 并保存了配置！"
          exit 1
        fi
        echo "✅ .config 已生成，大小：$(du -h openwrt/.config | cut -f1)"

    - name: 运行 make defconfig 整理依赖
      run: |
        cd openwrt
        yes "" | make defconfig

    - name: 下载软件包源码
      run: |
        cd openwrt
        make download -j8
        find dl -name "*.badcheck" -delete

    - name: 上传 .config 到 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: config-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ env.OPENWRT_PATH }}/.config
        include-hidden-files: true
        if-no-files-found: error
