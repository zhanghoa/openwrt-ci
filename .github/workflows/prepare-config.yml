name: Prepare Config Only (No Build)

on:
  workflow_dispatch:
    inputs:
      repo_preset:
        description: '选择源码仓库预设'
        required: true
        default: 'immortalwrt-24.10'
        type: choice
        options:
          - openwrt-23.05
          - openwrt-24.10
          - immortalwrt-23.05
          - immortalwrt-24.10
          - custom
      custom_repo_url:
        description: '当选择 "custom" 时，请输入 Git 仓库 URL'
        required: false
        type: string
      custom_repo_branch:
        description: '当选择 "custom" 时，请输入分支名'
        required: false
        type: string
      config_preset:
        description: '选择预设配置（仓库 configs/ 目录下的文件）'
        required: true
        default: 'ipq60xx-6.12-nowifi-nss.config'
        type: choice
        options:
          - ipq60xx-6.12-nowifi-nss.config
          - ipq60xx-6.12-nowifi-nss-full.config
          - ipq60xx-6.12-nowifi-nss-mini.config
          - custom
      custom_config_name:
        description: '当选择 "custom" 时，请输入配置文件路径'
        required: false
        type: string
      diy_script:
        description: '自定义脚本名称（留空则不执行）'
        required: false
        default: 'libwrt.sh'
        type: string
      ssh:
        description: '启用 SSH 调试（在 feeds 安装后、生成配置前进入）'
        required: false
        default: 'false'
        type: boolean
      upload_config:
        description: '上传生成的 .config 文件到 Artifact'
        required: false
        default: 'true'
        type: boolean

env:
  TZ: Asia/Shanghai

jobs:
  Prepare-Config:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 快速清理磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: 安装编译依赖
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev \
          libssl-dev python3-dev python3-pip rsync subversion sudo unzip wget \
          xz-utils zlib1g-dev dos2unix libfuse-dev
        sudo timedatectl set-timezone "$TZ"

    - name: 检出工作流仓库
      uses: actions/checkout@v4

    - name: 确定源码仓库和分支
      id: repo
      run: |
        PRESET="${{ github.event.inputs.repo_preset }}"
        if [ "$PRESET" == "custom" ]; then
          REPO_URL="${{ github.event.inputs.custom_repo_url }}"
          REPO_BRANCH="${{ github.event.inputs.custom_repo_branch }}"
          if [ -z "$REPO_URL" ] || [ -z "$REPO_BRANCH" ]; then
            echo "::error::自定义仓库时，必须同时提供 URL 和分支"
            exit 1
          fi
        else
          case "$PRESET" in
            openwrt-23.05)   REPO_URL="https://github.com/openwrt/openwrt.git"; REPO_BRANCH="openwrt-23.05" ;;
            openwrt-24.10)   REPO_URL="https://github.com/openwrt/openwrt.git"; REPO_BRANCH="openwrt-24.10" ;;
            immortalwrt-23.05) REPO_URL="https://github.com/immortalwrt/immortalwrt.git"; REPO_BRANCH="openwrt-23.05" ;;
            immortalwrt-24.10) REPO_URL="https://github.com/immortalwrt/immortalwrt.git"; REPO_BRANCH="openwrt-24.10" ;;
            *) echo "::error::未知预设"; exit 1 ;;
          esac
        fi
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "使用源码: $REPO_URL (分支: $REPO_BRANCH)"

    - name: 克隆源码
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

    - name: 复制配置文件到源码目录
      run: |
        mkdir -p openwrt/configs
        cp -r $GITHUB_WORKSPACE/configs/* openwrt/configs/ 2>/dev/null || echo "没有找到 configs 目录，跳过"

    - name: 缓存 dl 目录
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-prepare-dl-${{ hashFiles('openwrt/configs/*.config') }}
        restore-keys: |
          ${{ runner.os }}-prepare-dl-

    - name: 确定配置文件路径
      id: config
      run: |
        if [ "${{ github.event.inputs.config_preset }}" == "custom" ]; then
          CONFIG_FILE="${{ github.event.inputs.custom_config_name }}"
        else
          CONFIG_FILE="configs/${{ github.event.inputs.config_preset }}"
        fi
        echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        echo "使用配置文件: $CONFIG_FILE"

    - name: 更新并安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # --- SSH 调试（带公钥检查和容错） ---
    - name: 检查 SSH 公钥
      if: github.event.inputs.ssh == 'true'
      id: ssh_check
      run: |
        USER="${{ github.actor }}"
        KEYS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/users/$USER/keys" | jq 'length')
        if [ "$KEYS" -eq 0 ]; then
          echo "::warning::GitHub 用户 $USER 没有注册 SSH 公钥，无法启用 SSH 调试。"
          echo "ssh_available=false" >> $GITHUB_OUTPUT
        else
          echo "ssh_available=true" >> $GITHUB_OUTPUT
        fi

    - name: 启动 SSH 调试
      if: github.event.inputs.ssh == 'true' && steps.ssh_check.outputs.ssh_available == 'true'
      uses: mxschmitt/action-tmate@v3
      continue-on-error: true   # 即使失败也不中断后续步骤
      with:
        limit-access-to-actor: true

    - name: 提示 SSH 调试被跳过
      if: github.event.inputs.ssh == 'true' && steps.ssh_check.outputs.ssh_available != 'true'
      run: |
        echo "⚠️ SSH 调试已跳过，因为没有找到 SSH 公钥。"
        echo "   请前往 https://github.com/settings/keys 添加公钥后重新触发工作流。"

    # --- 生成最终配置 ---
    - name: 生成最终配置
      run: |
        cd openwrt
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "::error::找不到配置文件: $CONFIG_FILE"
          ls -la openwrt/configs/ || echo "configs/ 目录为空"
          exit 1
        fi
        cp $CONFIG_FILE .config

        DIY_SCRIPT="${{ github.event.inputs.diy_script }}"
        if [ -n "$DIY_SCRIPT" ] && [ -f "$GITHUB_WORKSPACE/$DIY_SCRIPT" ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
          $GITHUB_WORKSPACE/$DIY_SCRIPT
        elif [ -n "$DIY_SCRIPT" ]; then
          echo "::warning::DIY 脚本不存在: $DIY_SCRIPT"
        fi

        yes "" | make defconfig
        make download -j8
        find dl -name "*.badcheck" -delete

    - name: 验证 .config
      run: |
        if [ ! -f openwrt/.config ]; then
          echo "::error::.config 文件未生成！"
          exit 1
        fi
        echo "✅ .config 大小：$(du -h openwrt/.config | cut -f1)"
        head -n 10 openwrt/.config

    - name: 上传 .config 到 Artifact
      if: github.event.inputs.upload_config == 'true' || github.event.inputs.ssh == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: config-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ env.OPENWRT_PATH }}/.config
        include-hidden-files: true
        if-no-files-found: error
